<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תחזית פלייאוף - הליגה הלאומית</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #1a73e8; }
        .bracket-container { display: flex; justify-content: space-between; gap: 20px; max-width: 1200px; margin: 0 auto; overflow-x: auto; padding-bottom: 20px; }
        .column { flex: 1; min-width: 280px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        .matchup { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .matchup h3 { margin: 0 0 10px 0; font-size: 14px; color: #555; text-align: center; background: #f8f9fa; padding: 5px; border-radius: 4px; }
        .team-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .team-name { font-weight: bold; font-size: 15px; }
        input[type="number"] { width: 50px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .submit-section { max-width: 400px; margin: 40px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .submit-section input[type="text"] { width: 90%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
    </style>
</head>
<body>

    <h1>תחזית פלייאוף - הליגה הלאומית</h1>

    <div class="bracket-container">
        <div class="column">
            <div class="matchup">
                <h3>רבע גמר 1</h3>
                <div class="team-row"><span>מכבי רחובות</span><input type="number" id="qf1_1" value="0" min="0" max="2"></div>
                <div class="team-row"><span>א.ס רמת השרון</span><input type="number" id="qf1_2" value="0" min="0" max="2"></div>
            </div>
            <div class="matchup">
                <h3>רבע גמר 2</h3>
                <div class="team-row"><span>עירוני נהריה</span><input type="number" id="qf2_1" value="0" min="0" max="2"></div>
                <div class="team-row"><span>עוטף דרום</span><input type="number" id="qf2_2" value="0" min="0" max="2"></div>
            </div>
            <div class="matchup">
                <h3>רבע גמר 3</h3>
                <div class="team-row"><span>הפועל חיפה</span><input type="number" id="qf3_1" value="0" min="0" max="2"></div>
                <div class="team-row"><span>אליצור שומרון</span><input type="number" id="qf3_2" value="0" min="0" max="2"></div>
            </div>
            <div class="matchup">
                <h3>רבע גמר 4</h3>
                <div class="team-row"><span>מכבי אשדוד</span><input type="number" id="qf4_1" value="0" min="0" max="2"></div>
                <div class="team-row"><span>אשקלון</span><input type="number" id="qf4_2" value="0" min="0" max="2"></div>
            </div>
        </div>

        <div class="column">
            <div class="matchup">
                <h3>חצי גמר 1</h3>
                <div class="team-row"><span>מנצחת 1-4</span><input type="number" id="sf1_1" value="0" min="0" max="3"></div>
                <div class="team-row"><span>מנצחת 1-4</span><input type="number" id="sf1_2" value="0" min="0" max="3"></div>
            </div>
            <div class="matchup">
                <h3>חצי גמר 2</h3>
                <div class="team-row"><span>מנצחת 2-3</span><input type="number" id="sf2_1" value="0" min="0" max="3"></div>
                <div class="team-row"><span>מנצחת 2-3</span><input type="number" id="sf2_2" value="0" min="0" max="3"></div>
            </div>
        </div>

        <div class="column">
            <div class="matchup">
                <h3>הגמר</h3>
                <div class="team-row"><span>פיינליסטית א'</span><input type="number" id="f1" value="0" min="0" max="3"></div>
                <div class="team-row"><span>פיינליסטית ב'</span><input type="number" id="f2" value="0" min="0" max="3"></div>
            </div>
        </div>
    </div>

    <div class="submit-section">
        <input type="text" id="pName" placeholder="השם המלא שלך">
        <button id="sendBtn">שלח תחזית</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // === כאן אתה מדביק את המפתח שלך מ-FIREBASE ===
       // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCi3ci9dsoQLMBpJpniiXnFXPnRslPaUeM",
  authDomain: "playoffhapoel.firebaseapp.com",
  projectId: "playoffhapoel",
  storageBucket: "playoffhapoel.firebasestorage.app",
  messagingSenderId: "263243431887",
  appId: "1:263243431887:web:2515ff99c8962a4cbf5cba",
  measurementId: "G-NEV8LBNT8S"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        };
        // ===========================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('sendBtn').onclick = async () => {
            const name = document.getElementById('pName').value;
            if(!name) { alert("בבקשה הכנס שם"); return; }
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerText = "שולח...";

            try {
                await addDoc(collection(db, "brackets"), {
                    userName: name,
                    submittedAt: new Date(),
                    predictions: {
                        qf1: document.getElementById('qf1_1').value + "-" + document.getElementById('qf1_2').value,
                        qf2: document.getElementById('qf2_1').value + "-" + document.getElementById('qf2_2').value,
                        qf3: document.getElementById('qf3_1').value + "-" + document.getElementById('qf3_2').value,
                        qf4: document.getElementById('qf4_1').value + "-" + document.getElementById('qf4_2').value,
                        sf1: document.getElementById('sf1_1').value + "-" + document.getElementById('sf1_2').value,
                        sf2: document.getElementById('sf2_1').value + "-" + document.getElementById('sf2_2').value,
                        final: document.getElementById('f1').value + "-" + document.getElementById('f2').value
                    }
                });
                alert("התחזית נשמרה בהצלחה!");
                window.location.href = 'results.html';
            } catch (e) {
                alert("שגיאה בשליחה");
                btn.disabled = false;
                btn.innerText = "שלח תחזית";
            }
        };
    </script>
</body>
</html>
