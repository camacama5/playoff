<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תחזית פלייאוף - הליגה הלאומית</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; text-align: center; }
        .bracket-container { display: flex; justify-content: space-between; gap: 20px; max-width: 1100px; margin: 20px auto; overflow-x: auto; }
        .column { flex: 1; min-width: 250px; display: flex; flex-direction: column; justify-content: space-around; gap: 15px; }
        .matchup { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; }
        .team-name { font-weight: bold; width: 120px; text-align: right; }
        input[type="number"] { width: 40px; padding: 3px; text-align: center; border-radius: 4px; border: 1px solid #ccc; }
        .submit-section { margin: 30px auto; max-width: 300px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:disabled { background: #ccc; }
        .winner-label { color: #1a73e8; font-size: 12px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>תחזית פלייאוף - הליגה הלאומית</h1>

    <div class="bracket-container">
        <div class="column">
            <div class="matchup">
                <span class="winner-label">רבע 1</span>
                <div class="team-row"><span id="q1_t1_name" class="team-name">מכבי רחובות</span><input type="number" id="q1_s1" oninput="updateBracket()" value="0"></div>
                <div class="team-row"><span id="q1_t2_name" class="team-name">רמת השרון</span><input type="number" id="q1_s2" oninput="updateBracket()" value="0"></div>
            </div>
            <div class="matchup">
                <span class="winner-label">רבע 4</span>
                <div class="team-row"><span id="q4_t1_name" class="team-name">מכבי אשדוד</span><input type="number" id="q4_s1" oninput="updateBracket()" value="0"></div>
                <div class="team-row"><span id="q4_t2_name" class="team-name">אשקלון</span><input type="number" id="q4_s2" oninput="updateBracket()" value="0"></div>
            </div>
            <div class="matchup">
                <span class="winner-label">רבע 2</span>
                <div class="team-row"><span id="q2_t1_name" class="team-name">עירוני נהריה</span><input type="number" id="q2_s1" oninput="updateBracket()" value="0"></div>
                <div class="team-row"><span id="q2_t2_name" class="team-name">עוטף דרום</span><input type="number" id="q2_s2" oninput="updateBracket()" value="0"></div>
            </div>
            <div class="matchup">
                <span class="winner-label">רבע 3</span>
                <div class="team-row"><span id="q3_t1_name" class="team-name">הפועל חיפה</span><input type="number" id="q3_s1" oninput="updateBracket()" value="0"></div>
                <div class="team-row"><span id="q3_t2_name" class="team-name">אליצור שומרון</span><input type="number" id="q3_s2" oninput="updateBracket()" value="0"></div>
            </div>
        </div>

        <div class="column">
            <div class="matchup">
                <span class="winner-label">חצי גמר 1</span>
                <div class="team-row"><span id="sf1_t1_name" class="team-name">---</span><input type="number" id="sf1_s1" oninput="updateBracket()" value="0"></div>
                <div class="team-row"><span id="sf1_t2_name" class="team-name">---</span><input type="number" id="sf1_s2" oninput="updateBracket()" value="0"></div>
            </div>
            <div class="matchup">
                <span class="winner-label">חצי גמר 2</span>
                <div class="team-row"><span id="sf2_t1_name" class="team-name">---</span><input type="number" id="sf2_s1" oninput="updateBracket()" value="0"></div>
                <div class="team-row"><span id="sf2_t2_name" class="team-name">---</span><input type="number" id="sf2_s2" oninput="updateBracket()" value="0"></div>
            </div>
        </div>

        <div class="column">
            <div class="matchup">
                <span class="winner-label">הגמר הגדול</span>
                <div class="team-row"><span id="f_t1_name" class="team-name">---</span><input type="number" id="f_s1" value="0"></div>
                <div class="team-row"><span id="f_t2_name" class="team-name">---</span><input type="number" id="f_s2" value="0"></div>
            </div>
        </div>
    </div>

    <div class="submit-section">
        <input type="text" id="pName" placeholder="השם שלך" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc;">
        <button id="sendBtn">שלח תחזית</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCi3ci9dsoQLMBpJpniiXnFXPnRslPaUeM",
            authDomain: "playoffhapoel.firebaseapp.com",
            projectId: "playoffhapoel",
            storageBucket: "playoffhapoel.firebasestorage.app",
            messagingSenderId: "263243431887",
            appId: "1:263243431887:web:2515ff99c8962a4cbf5cba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // פונקציה לעדכון אוטומטי של שמות המנצחות
        window.updateBracket = function() {
            const getWinner = (m, t1, t2) => {
                const s1 = parseInt(document.getElementById(m+'_s1').value);
                const s2 = parseInt(document.getElementById(m+'_s2').value);
                if (s1 > s2) return document.getElementById(t1).innerText;
                if (s2 > s1) return document.getElementById(t2).innerText;
                return "---";
            };

            document.getElementById('sf1_t1_name').innerText = getWinner('q1', 'q1_t1_name', 'q1_t2_name');
            document.getElementById('sf1_t2_name').innerText = getWinner('q4', 'q4_t1_name', 'q4_t2_name');
            document.getElementById('sf2_t1_name').innerText = getWinner('q2', 'q2_t1_name', 'q2_t2_name');
            document.getElementById('sf2_t2_name').innerText = getWinner('q3', 'q3_t1_name', 'q3_t2_name');
            
            document.getElementById('f_t1_name').innerText = getWinner('sf1', 'sf1_t1_name', 'sf1_t2_name');
            document.getElementById('f_t2_name').innerText = getWinner('sf2', 'sf2_t1_name', 'sf2_t2_name');
        }

        document.getElementById('sendBtn').onclick = async () => {
            const name = document.getElementById('pName').value;
            if(!name) return alert("אנא הזן שם");
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerText = "שולח...";

            try {
                await addDoc(collection(db, "brackets"), {
                    userName: name,
                    submittedAt: new Date(),
                    predictions: {
                        qf1: document.getElementById('q1_s1').value + "-" + document.getElementById('q1_s2').value,
                        qf2: document.getElementById('q2_s1').value + "-" + document.getElementById('q2_s2').value,
                        qf3: document.getElementById('q3_s1').value + "-" + document.getElementById('q3_s2').value,
                        qf4: document.getElementById('q4_s1').value + "-" + document.getElementById('q4_s2').value,
                        sf1: document.getElementById('sf1_s1').value + "-" + document.getElementById('sf1_s2').value,
                        sf2: document.getElementById('sf2_s1').value + "-" + document.getElementById('sf2_s2').value,
                        final: document.getElementById('f_s1').value + "-" + document.getElementById('f_s2').value
                    }
                });
                alert("נשמר בהצלחה!");
                window.location.href = 'results.html';
            } catch (e) {
                alert("שגיאה! וודא שחוקי Firebase פתוחים. " + e.message);
                btn.disabled = false;
                btn.innerText = "שלח תחזית";
            }
        };
    </script>
</body>
</html>
