<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מי מילא תחזית?</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .box { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: right; }
        tr:hover { background: #f9f9f9; cursor: pointer; }
        
        /* מודאל */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); overflow-y: auto; z-index: 1000; }
        .modal-content { background: #f0f2f5; margin: 2% auto; padding: 20px; width: 95%; max-width: 1300px; border-radius: 12px; position: relative; }
        
        /* בארקט סימטרי בתוך המודאל */
        .bracket-view { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; direction: ltr; }
        .v-col { flex: 1; display: flex; flex-direction: column; justify-content: space-around; gap: 15px; height: 500px; }
        .v-qf { flex: 0 0 220px; }
        .v-match { background: white; border-radius: 6px; padding: 8px; border: 1px solid #ddd; direction: rtl; }
        .v-match h4 { margin: 0 0 3px 0; font-size: 10px; color: #888; background: #f8f9fa; padding: 2px; }
        .v-row { display: flex; justify-content: space-between; font-size: 12px; margin: 2px 0; font-weight: bold; }
        .v-score { background: #eee; padding: 0 5px; border-radius: 3px; min-width: 20px; text-align: center; }
        
        /* מרכז המודאל - זוכה וגמר */
        .v-center { flex: 0 0 300px; justify-content: center; gap: 30px; }
        .v-final-box { border: 2px solid #1a73e8; }
        .v-winner { background: #1a73e8; color: white; border-radius: 8px; padding: 15px; font-weight: bold; border: 2px solid #0d47a1; direction: rtl; }
        #win-name { font-size: 20px; color: #ffeb3b; display: block; margin-top: 5px; }
        
        .close-btn { position: absolute; left: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #666; }
    </style>
</head>
<body>
    <div class="box">
        <h2>מי מילא תחזית?</h2>
        <p>לחץ על שם כדי לראות את הבארקט המלא</p>
        <table id="mainTable">
            <thead><tr><th>שם המשתתף</th><th>תאריך</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <div id="m" class="modal" onclick="closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeM()">&times;</span>
            <h2 id="mt" style="margin-bottom: 5px;"></h2>
            <div id="bracketBody" class="bracket-view"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCi3ci9dsoQLMBpJpniiXnFXPnRslPaUeM", authDomain: "playoffhapoel.firebaseapp.com", projectId: "playoffhapoel", storageBucket: "playoffhapoel.firebasestorage.app", messagingSenderId: "263243431887", appId: "1:263243431887:web:2515ff99c8962a4cbf5cba" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.closeM = () => document.getElementById('m').style.display = 'none';

        async function loadResults() {
            const snap = await getDocs(query(collection(db, "brackets"), orderBy("date", "desc")));
            const list = document.getElementById('list');
            list.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${d.userName}</td><td>${d.date.toDate().toLocaleDateString('he-IL')}</td>`;
                
                tr.onclick = () => {
                    document.getElementById('mt').innerText = "הניחוש של: " + d.userName;
                    const b = d.data;
                    
                    // פונקציה פנימית לרינדור משחק בתוך המודאל
                    const r = (id, label, extraClass='') => `
                        <div class="v-match ${extraClass}">
                            <h4>${label}</h4>
                            <div class="v-row"><span>${b[id].t1}</span><span class="v-score">${b[id].s1}</span></div>
                            <div class="v-row"><span>${b[id].t2}</span><span class="v-score">${b[id].s2}</span></div>
                        </div>`;
                    
                    // בניית המבנה הסימטרי (ימין -> מרכז -> שמאל)
                    document.getElementById('bracketBody').innerHTML = `
                        <div class="v-col v-qf">${r('q1','משחק 1')} ${r('q4','משחק 4')}</div>
                        <div class="v-col">${r('sf1','חצי גמר 1')}</div>
                        <div class="v-col v-center">
                            <div class="v-winner">הזוכה הגדולה:<br><span id="win-name">${d.winner || '---'}</span></div>
                            ${r('f','סדרת הגמר', 'v-final-box')}
                        </div>
                        <div class="v-col">${r('sf2','חצי גמר 2')}</div>
                        <div class="v-col v-qf">${r('q2','משחק 2')} ${r('q3','משחק 3')}</div>
                    `;
                    document.getElementById('m').style.display = 'block';
                };
                list.appendChild(tr);
            });
        }

        loadResults();
    </script>
</body>
</html>
