<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מי מילא תחזית?</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .box { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: right; }
        tr:hover { background: #f9f9f9; cursor: pointer; }
        
        /* מודאל */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8) !important; overflow-y: auto; z-index: 1000; }
        .modal-content { background: #e8ebf0 !important; margin: 2% auto; padding: 20px; width: 95%; max-width: 1300px; border-radius: 12px; position: relative; }
        
        /* בארקט סימטרי בתוך המודאל */
        .bracket-view { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; direction: ltr; }
        .v-col { flex: 1; display: flex; flex-direction: column; justify-content: space-around; gap: 15px; height: 500px; }
        .v-qf { flex: 0 0 220px; }
        
        .v-match { 
            background: white !important; 
            border-radius: 6px !important; 
            padding: 0 !important; 
            border: none !important;
            border-right: 5px solid #06274c !important; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1) !important; 
            direction: rtl; 
            overflow: hidden; 
        }
        .v-match h4 { margin: 0 !important; font-size: 11px !important; color: white !important; background: #06274c !important; padding: 5px !important; text-align: center !important; }
        .v-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 14px; border-bottom: 1px solid #eee; font-weight: bold; color: #333 !important; }
        .v-score { color: #cc0000 !important; font-size: 18px !important; font-weight: bold !important; background: none !important; }
        
        /* מרכז המודאל - זוכה וגמר */
        .v-center { flex: 0 0 300px; justify-content: center; gap: 30px; }
        .v-final-box { border-right-color: #cc0000 !important; }
        .v-winner { 
            background: white !important; 
            color: #cc0000 !important; 
            border-radius: 8px !important; 
            padding: 20px !important; 
            font-weight: bold !important; 
            border: 3px solid #cc0000 !important; 
            direction: rtl; 
            box-shadow: 0 4px 15px rgba(204,0,0,0.3) !important; 
        }
        #win-name { font-size: 26px !important; color: #cc0000 !important; display: block; margin-top: 8px; }
        
        .close-btn { position: absolute; left: 20px; top: 15px; font-size: 35px; cursor: pointer; color: #06274c !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>מי מילא תחזית?</h2>
        <p>לחץ על שם כדי לראות את הבארקט המלא</p>
        <table id="mainTable">
            <thead><tr><th>שם המשתתף</th><th>תאריך</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <div id="m" class="modal" onclick="closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeM()">&times;</span>
            <h2 id="mt" style="margin-bottom: 5px; color: #06274c;"></h2>
            <div id="bracketBody" class="bracket-view"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCi3ci9dsoQLMBpJpniiXnFXPnRslPaUeM", authDomain: "playoffhapoel.firebaseapp.com", projectId: "playoffhapoel", storageBucket: "playoffhapoel.firebasestorage.app", messagingSenderId: "263243431887", appId: "1:263243431887:web:2515ff99c8962a4cbf5cba" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.closeM = () => document.getElementById('m').style.display = 'none';

        async function loadResults() {
            const snap = await getDocs(query(collection(db, "brackets"), orderBy("date", "desc")));
            const list = document.getElementById('list');
            list.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${d.userName}</td><td>${d.date.toDate().toLocaleDateString('he-IL')}</td>`;
                
                tr.onclick = () => {
                    document.getElementById('mt').innerText = "הניחוש של: " + d.userName;
                    const b = d.data;
                    
                    const r = (id, label, extraClass='') => `
                        <div class="v-match ${extraClass}">
                            <h4>${label}</h4>
                            <div class="v-row"><span>${b[id].t1}</span><span class="v-score">${b[id].s1}</span></div>
                            <div class="v-row"><span>${b[id].t2}</span><span class="v-score">${b[id].s2}</span></div>
                        </div>`;
                    
                    document.getElementById('bracketBody').innerHTML = `
                        <div class="v-col v-qf">${r('q1','משחק 1')} ${r('q4','משחק 4')}</div>
                        <div class="v-col">${r('sf1','חצי גמר 1')}</div>
                        <div class="v-col v-center">
                            <div class="v-winner">הזוכה הגדולה:<br><span id="win-name">${d.winner || '---'}</span></div>
                            ${r('f','סדרת הגמר', 'v-final-box')}
                        </div>
                        <div class="v-col">${r('sf2','חצי גמר 2')}</div>
                        <div class="v-col v-qf">${r('q2','משחק 2')} ${r('q3','משחק 3')}</div>
                    `;
                    document.getElementById('m').style.display = 'block';
                };
                list.appendChild(tr);
            });
        }

        loadResults();
    </script>
</body>
</html>
