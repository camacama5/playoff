<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טבלת משתתפים - תחזיות פלייאוף</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #1a73e8; }
        .table-container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #f8f9fa; color: #555; }
        tr:hover { background-color: #f1f3f4; cursor: pointer; }
        
        /* עיצוב חלון הפופ-אפ (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .close-btn { color: #aaa; float: left; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #000; }
        .prediction-item { background: #f8f9fa; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #eee; }
        .prediction-item strong { color: #1a73e8; }
    </style>
</head>
<body>

    <h1>רשימת משתתפים</h1>
    
    <div class="table-container">
        <table id="usersTable">
            <thead>
                <tr>
                    <th>שם משתתף</th>
                    <th>תאריך שליחה</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="2" style="text-align: center;">טוען נתונים...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="bracketModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modalTitle">הבראקט של...</h2>
            <div id="modalDetails"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // === הדבק את ה-firebaseConfig שלך כאן (בדיוק אותו אחד) ===
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // =========================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const modal = document.getElementById("bracketModal");
        const closeModal = document.getElementById("closeModal");

        closeModal.onclick = function() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        async function loadData() {
            const tbody = document.getElementById("tableBody");
            try {
                // משיכת נתונים מסודרים לפי תאריך
                const q = query(collection(db, "brackets"), orderBy("submittedAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                tbody.innerHTML = ""; // ניקוי טקסט הטעינה

                if(querySnapshot.empty) {
                    tbody.innerHTML = "<tr><td colspan='2' style='text-align: center;'>עדיין אין נרשמים.</td></tr>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const tr = document.createElement("tr");
                    
                    // המרת התאריך של פיירבייס לתאריך קריא
                    const dateObj = data.submittedAt.toDate();
                    const formattedDate = dateObj.toLocaleDateString('he-IL') + " " + dateObj.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});

                    tr.innerHTML = `<td>${data.userName}</td><td>${formattedDate}</td>`;
                    
                    // אירוע לחיצה על השורה יפתח את הבראקט של אותו אדם
                    tr.addEventListener("click", () => showBracket(data));
                    
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error loading documents: ", error);
                tbody.innerHTML = "<tr><td colspan='2' style='text-align: center; color: red;'>שגיאה בטעינת הנתונים.</td></tr>";
            }
        }

        function showBracket(data) {
            document.getElementById("modalTitle").innerText = "הבראקט של " + data.userName;
            
            const p = data.predictions;
            const detailsHtml = `
                <div class="prediction-item"><strong>רבע גמר 1 (רחובות - רמת השרון):</strong> ${p.qf1}</div>
                <div class="prediction-item"><strong>רבע גמר 2 (נהריה - עוטף דרום):</strong> ${p.qf2}</div>
                <div class="prediction-item"><strong>רבע גמר 3 (חיפה - שומרון):</strong> ${p.qf3}</div>
                <div class="prediction-item"><strong>רבע גמר 4 (אשדוד - אשקלון):</strong> ${p.qf4}</div>
                <div class="prediction-item"><strong>חצי גמר 1:</strong> ${p.sf1}</div>
                <div class="prediction-item"><strong>חצי גמר 2:</strong> ${p.sf2}</div>
                <div class="prediction-item"><strong>הגמר:</strong> ${p.final}</div>
            `;
            
            document.getElementById("modalDetails").innerHTML = detailsHtml;
            modal.style.display = "block";
        }

        // הפעלת הפונקציה בטעינת הדף
        loadData();
    </script>
</body>
</html>
